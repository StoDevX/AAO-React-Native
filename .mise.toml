[tools]
node = "22.20.0"
hk = "latest"

[env]
_.path = ["node_modules/.bin"]
HK_PKL_BACKEND = "pklr"

# --- App commands ---

[tasks.android]
description = "Run the Android app"
run = "react-native run-android"

[tasks.ios]
description = "Run the iOS app"
run = "react-native run-ios"

[tasks.start]
description = "Start Metro bundler"
run = "react-native start"

[tasks.pods]
description = "Install CocoaPods"
run = "scripts/pods.sh"

[tasks.fastlane]
description = "Run fastlane"
run = "bundle exec fastlane"

# --- Code quality ---

[tasks.lint]
description = "Run ESLint"
run = "eslint --report-unused-disable-directives --cache source/ modules/ scripts/ images/"

[tasks.pretty]
description = "Format code with Prettier"
run = "prettier --write '{source,modules,scripts,images,e2e}/**/*.{js,ts,tsx,json}' 'data/**/*.css' '{*,.*}.{yaml,yml,json,json5,js,ts,tsx}'"

[tasks."pretty:check"]
description = "Check code formatting"
run = "prettier --check '{source,modules,scripts,images,e2e}/**/*.{js,ts,tsx,json}' 'data/**/*.css' '{*,.*}.{yaml,yml,json,json5,js,ts,tsx}'"

[tasks.p]
description = "Format staged files with pretty-quick"
run = "pretty-quick"

[tasks.tsc]
description = "Run TypeScript compiler"
run = "tsc --noEmit"

[tasks.test]
description = "Run Jest tests"
run = "jest"

[tasks.prepare]
description = "Apply patches"
run = "scripts/apply-patches.sh"

# --- Data ---

[tasks."bundle-data"]
description = "Bundle data files"
run = "node scripts/bundle-data.mjs data/ docs/"

[tasks."validate-bus-data"]
description = "Validate bus schedule data"
run = "node scripts/validate-bus-schedules.mjs"

[tasks."validate-data"]
description = "Validate data files"
run = "node scripts/validate-data.mjs"

[tasks."compress-data"]
description = "Compress data files"
run = "gzip --keep docs/*.json"

# --- Bundles ---

[tasks."bundle:android"]
description = "Generate Android JS bundle"
run = """
mkdir -p android/generated/assets/ android/generated/res/
react-native bundle \
  --entry-file index.js \
  --dev true \
  --platform android \
  --bundle-output ./android/generated/assets/index.android.bundle \
  --sourcemap-output ./android/generated/assets/index.android.bundle.map \
  --assets-dest ./android/generated/res/
"""

[tasks."bundle:ios"]
description = "Generate iOS JS bundle"
run = """
react-native bundle \
  --entry-file index.js \
  --dev false \
  --platform ios \
  --bundle-output ./ios/AllAboutOlaf/main.jsbundle \
  --sourcemap-output ./ios/AllAboutOlaf/main.jsbundle.map \
  --assets-dest ./ios
"""

# --- Diagnostics (from Makefile) ---

[tasks.tsc-errors]
description = "Generate TypeScript error report"
run = 'tsc 2>&1 | sed "s:$(git rev-parse --show-toplevel):.:g" | tee tsc-errors || true'

[tasks.tsc-counts]
description = "Count TypeScript errors by code"
depends = ["tsc-errors"]
run = "cat tsc-errors | rg -or '$1' 'error \\b(TS\\d+)\\b' | sort | uniq -c | sort -nr | sed 's/^ *//' | tee tsc-counts || true"

[tasks.eslint-problems]
description = "Generate ESLint problem report"
run = 'mise run lint 2>&1 | sed "s:$(git rev-parse --show-toplevel):.:g" | tee eslint-problems || true'

[tasks.files]
description = "Generate all diagnostic reports"
depends = ["tsc-errors", "tsc-counts", "eslint-problems"]

[tasks.verify]
description = "Verify no diagnostic changes"
depends = ["files"]
run = "git diff --exit-code"
