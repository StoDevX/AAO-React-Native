name: Check & Update Cocoapods

on:
  push:
    paths:
      - package-lock.json
      - ios/Podfile
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  ios-podfile-update:
    # Adapted from https://gist.github.com/A-Tokyo/0d811e818513fc4d3272335d2847d748
    name: iOS Update Cocoapods
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'push' || (github.event_name == 'issue_comment' && github.event.issue.pull_request.url != '' && contains(github.event.comment.body, '/update-pods') && (contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) || github.actor == 'renovate[bot]'))
    steps:
      - name: Get PR branch info (comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr-info
        run: |
          pr_data=$(gh api "${{ github.event.issue.pull_request.url }}")
          pr_branch=$(echo "$pr_data" | jq -r '.head.ref')
          pr_head_repo=$(echo "$pr_data" | jq -r '.head.repo.full_name')

          if [ "$pr_head_repo" != "$BASE_REPOSITORY" ]; then
            echo "::error::Refusing to update pods for forked PR head repository '$pr_head_repo'. Expected '$BASE_REPOSITORY'."
            exit 1
          fi

          echo "branch=$pr_branch" >> "$GITHUB_OUTPUT"
          echo "head_ref=refs/heads/$pr_branch" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.COCOAPODS_LOCKFILE_GH_PUSH_TOKEN }}
          BASE_REPOSITORY: ${{ github.repository }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.COCOAPODS_LOCKFILE_GH_PUSH_TOKEN }}
          ref: ${{ steps.pr-info.outputs.branch || github.ref }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - run: npm ci

      - run: mise run pod:install --verbose

      - name: push-on-podfile-change
        run: bash scripts/push-on-podfile-change.sh
        env:
          branch: ${{ steps.pr-info.outputs.branch || github.ref_name }}
          head_ref: ${{ steps.pr-info.outputs.head_ref || github.ref }}
