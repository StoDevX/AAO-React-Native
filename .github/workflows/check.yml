name: Check

on:
  push: {branches: [master]}
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  xcode_version: 'Xcode_16.4'
  cache_epoch: '1'
  MISE_RUBY_COMPILE: 'false'

jobs:
  hk:
    name: hk
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: hk check

  prettier:
    name: Prettier
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run pretty:check

  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: mise run lint

  jest:
    name: Jest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - name: Run tests
        run: mise run test -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0

  tsc:
    name: TypeScript
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: mise run tsc

  data:
    name: Data
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run validate-data
      - run: mise run bundle-data

  ios-bundle:
    name: iOS Bundle
    needs: [jest, eslint]
    runs-on: ubuntu-24.04
    outputs:
      cache-key: ${{ steps.jsbundle-cache.outputs.cache-matched-key || steps.jsbundle-cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore cached jsbundle
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: jsbundle-cache
        with:
          lookup-only: true
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: jsbundle/e=${{ env.cache_epoch }}/host=ubuntu@24.04/target=ios/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('.mise.toml', 'package.json', 'package-lock.json', 'tsconfig.json', 'babel.config.js', 'index.js', 'data/**', 'images/**', 'modules/**.ts', 'modules/**.tsx', 'source/**.ts', 'source/**.tsx') }}
          restore-keys: |
            jsbundle/e=${{ env.cache_epoch }}/host=ubuntu@24.04/target=ios/ref=master/hash=${{ hashFiles('.mise.toml', 'package.json', 'package-lock.json', 'tsconfig.json', 'babel.config.js', 'index.js', 'data/**', 'images/**', 'modules/**.ts', 'modules/**.tsx', 'source/**.ts', 'source/**.tsx') }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''

      - name: Install npm dependencies
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        run: npm ci

      - name: Bundle data
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        run: mise run bundle-data

      - name: Generate jsbundle
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        run: mise run bundle:ios
        env:
          APP_MODE: mocked

      - name: Save jsbundle to cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        with:
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: ${{ steps.jsbundle-cache.outputs.cache-primary-key }}

  ios-build:
    name: Build for iOS
    needs: [jest, eslint]
    runs-on: macos-15
    outputs:
      cache-key: ${{ steps.app-cache.outputs.cache-matched-key || steps.app-cache.outputs.cache-primary-key }}
    steps:
      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app

      - run: sudo xcode-select -s /Applications/${{ env.xcode_version }}.app

      - name: List available iOS simulators
        run: xcrun simctl list devices iOS

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for cached iOS app
        id: app-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          lookup-only: true
          path: ios/build/Build/Products/
          key: ios-app/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**', 'ios/AllAboutOlafUITests/**') }}
          restore-keys: |
            ios-app/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=master/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**', 'ios/AllAboutOlafUITests/**') }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        if: steps.app-cache.outputs.cache-matched-key == ''

      - name: Install npm dependencies
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: npm ci

      - name: Install ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: brew install ccache

      - name: Restore/save ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Caches/ccache
          key: ccache/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}
          restore-keys: |
            ccache/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=master/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}

      - name: Configure ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: |
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: Install CocoaPods
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: mise run pod:install --deployment
        env:
          USE_CCACHE: '1'

      - name: Build UITest bundle
        if: ${{ steps.app-cache.outputs.cache-matched-key == '' && !contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e') }}
        env:
          SKIP_BUNDLING: 'true'
          CODE_SIGNING_DISABLED: 'true'
          USE_CCACHE: '1'
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -workspace ios/AllAboutOlaf.xcworkspace \
            -scheme AllAboutOlaf \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -only-testing:AllAboutOlafUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Show ccache stats
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: ccache --show-stats

      - name: Save iOS app to cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: ${{ steps.app-cache.outputs.cache-matched-key == '' && !contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e') }}
        with:
          path: ios/build/Build/Products/
          key: ${{ steps.app-cache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ steps.app-cache.outputs.cache-matched-key == '' && !contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e') }}
        with:
          name: ios-app
          path: ios/build/Build/Products/

  uitest-plan:
    name: Plan UITest shards
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e') }}
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Split tests across shards
        id: split
        run: |
          matrix=$(python3 scripts/split-uitests.py \
            --test-dir ios/AllAboutOlafUITests \
            --shards 2)
          {
            echo 'matrix<<EOF'
            echo "${matrix}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  ios-uitest:
    name: Native UITest for iOS (${{ matrix.shard }})
    needs: [uitest-plan, ios-build, ios-bundle]
    runs-on: macos-15
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.uitest-plan.outputs.matrix) }}
    steps:
      - run: sudo xcode-select -s /Applications/${{ env.xcode_version }}.app

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load the cached iOS app and UITest bundle
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: app-cache
        with:
          fail-on-cache-miss: true
          path: ios/build/Build/Products/
          key: ${{ needs.ios-build.outputs.cache-key }}

      - name: Load the cached iOS jsbundle
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: jsbundle-cache
        with:
          fail-on-cache-miss: true
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: ${{ needs.ios-bundle.outputs.cache-key }}

      - name: Move cached jsbundle into place
        run: |
          mkdir -p ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/
          mv ios/AllAboutOlaf/main.jsbundle ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/
          mv ios/AllAboutOlaf/main.jsbundle.map ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/
          rm -rf ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/assets || true
          mv ios/assets ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/

      - name: Discover simulator device
        id: simulator-device
        run: |
          set -o pipefail
          OS_VERSION=$(grep -m1 'IPHONEOS_DEPLOYMENT_TARGET' ios/AllAboutOlaf.xcodeproj/project.pbxproj | sed 's/.*= \(.*\);/\1/' | tr -d '[:space:]')
          echo "type=iPhone 16 Pro" | tee -a "$GITHUB_OUTPUT"
          echo "os=${OS_VERSION//./-}" | tee -a "$GITHUB_OUTPUT"

      - name: List available simulators (json)
        id: devices
        run: |
          set -o pipefail
          xcrun simctl list devices iOS -j \
            | jq '.devices | map_values([.[] | del(.dataPath, .dataPathSize, .logPath, .isAvailable)])' \
            | jq -r '"devices=\(.)"' \
            | tee "$GITHUB_OUTPUT"

      - name: Filter simulators by OS
        id: devices-by-os
        env:
          DEVICES: '${{ steps.devices.outputs.devices }}'
          SIMULATOR_OS: '${{ steps.simulator-device.outputs.os }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | to_entries[] | select(.key | endswith("iOS-\(env.SIMULATOR_OS)")) | .value | "devices=\(.)"' | tee "$GITHUB_OUTPUT"

      - name: Filter simulators by device type
        id: devices-by-os-and-type
        env:
          DEVICES: '${{ steps.devices-by-os.outputs.devices }}'
          SIMULATOR_TYPE: '${{ steps.simulator-device.outputs.type }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | .[] | select(.name == env.SIMULATOR_TYPE) | "devices=\(.)"' | tee "$GITHUB_OUTPUT"

      - name: Resolve simulator UDID
        id: udid
        env:
          DEVICES: '${{ steps.devices-by-os-and-type.outputs.devices }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | "udid=\(.udid)"' | tee "$GITHUB_OUTPUT"

      - name: Boot the simulator
        run: xcrun simctl boot "${{ steps.udid.outputs.udid }}"

      - name: Wait for the simulator to be ready
        run: xcrun simctl bootstatus "${{ steps.udid.outputs.udid }}" -b

      - name: Run UITests
        timeout-minutes: 25
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -xctestrun $(find ios/build/Build/Products -name '*.xctestrun' -print -quit) \
            -destination "platform=iOS Simulator,id=${{ steps.udid.outputs.udid }}" \
            ${{ matrix.tests }} \
            -resultBundlePath uitest-results \
            | xcbeautify --renderer github-actions

      - name: Extract failure screenshots
        if: failure()
        run: |
          mkdir -p uitest-screenshots
          xcrun xcresulttool export attachments \
            --path uitest-results.xcresult \
            --output-path uitest-screenshots || echo "No attachments to export"
          screenshot_count=$(find uitest-screenshots \( -name '*.png' -o -name '*.jpg' \) 2>/dev/null | wc -l | tr -d ' ')
          echo "Found ${screenshot_count} screenshot(s)"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: uitest-screenshots-${{ matrix.shard }}
          path: uitest-screenshots/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: uitest-results-${{ matrix.shard }}
          path: uitest-results.xcresult/
