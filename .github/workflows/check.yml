name: Check

on:
  push: {branches: [master]}
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  xcode_version: 'Xcode_16.4'
  cache_epoch: '1'
  MISE_RUBY_COMPILE: 'false'

jobs:
  hk:
    name: hk
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: hk check

  prettier:
    name: Prettier
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run pretty:check

  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: mise run lint

  jest:
    name: Jest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - name: Run tests
        run: mise run test -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0

  tsc:
    name: TypeScript
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run bundle-data
      - run: mise run tsc

  data:
    name: Data
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: npm ci
      - run: mise run validate-data
      - run: mise run bundle-data

  ios-bundle:
    name: iOS Bundle
    needs: [jest, eslint]
    runs-on: ubuntu-24.04
    outputs:
      cache-key: ${{ steps.jsbundle-cache.outputs.cache-matched-key || steps.jsbundle-cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - run: npm ci

      - name: Restore cached jsbundle
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: jsbundle-cache
        with:
          lookup-only: true
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: jsbundle/e=${{ env.cache_epoch }}/host=ubuntu@24.04/target=ios/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('.mise.toml', 'package.json', 'package-lock.json', 'tsconfig.json', 'babel.config.js', 'index.js', 'data/**', 'images/**', 'modules/**.ts', 'modules/**.tsx', 'source/**.ts', 'source/**.tsx') }}
          restore-keys: |
            jsbundle/e=${{ env.cache_epoch }}/host=ubuntu@24.04/target=ios/ref=master/hash=${{ hashFiles('.mise.toml', 'package.json', 'package-lock.json', 'tsconfig.json', 'babel.config.js', 'index.js', 'data/**', 'images/**', 'modules/**.ts', 'modules/**.tsx', 'source/**.ts', 'source/**.tsx') }}

      - name: Bundle data
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        run: mise run bundle-data

      - name: Generate jsbundle
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        run: mise run bundle:ios
        env:
          APP_MODE: mocked

      - name: Save jsbundle to cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: steps.jsbundle-cache.outputs.cache-matched-key == ''
        with:
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: ${{ steps.jsbundle-cache.outputs.cache-primary-key }}

  ios-build:
    name: Build for iOS
    needs: [jest, eslint]
    runs-on: macos-15
    outputs:
      cache-key: ${{ steps.app-cache.outputs.cache-matched-key || steps.app-cache.outputs.cache-primary-key }}
    steps:
      - run: sudo xcode-select -s /Applications/${{ env.xcode_version }}.app

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for cached iOS app
        id: app-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          lookup-only: true
          path: ios/build/Build/Products/
          key: ios-app/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}
          restore-keys: |
            ios-app/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=master/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        if: steps.app-cache.outputs.cache-matched-key == ''

      - name: Install npm dependencies
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: npm ci

      - name: Install ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: brew install ccache

      - name: Restore/save ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Caches/ccache
          key: ccache/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=${{ github.head_ref || github.ref_name }}/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}
          restore-keys: |
            ccache/e=${{ env.cache_epoch }}/host=macOS@15/target=ios/xcode=${{ env.xcode_version }}/ref=master/hash=${{ hashFiles('**/project.pbxproj', 'ios/Podfile', '**/Podfile.lock', 'ios/AllAboutOlaf/**') }}

      - name: Configure ccache
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: |
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: Install CocoaPods
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: mise run pod:install --deployment
        env:
          USE_CCACHE: '1'

      - name: Build the iOS app
        if: ${{ steps.app-cache.outputs.cache-matched-key == '' && !contains(github.event.pull_request.labels.*.name, 'ci/skip-detox') }}
        env:
          SKIP_BUNDLING: 'true'
          CODE_SIGNING_DISABLED: 'true'
          USE_CCACHE: '1'
        run: npx detox build e2e --configuration ios.sim.release

      - name: Show ccache stats
        if: steps.app-cache.outputs.cache-matched-key == ''
        run: ccache --show-stats

      - name: Save iOS app to cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: steps.app-cache.outputs.cache-matched-key == ''
        with:
          path: ios/build/Build/Products/
          key: ${{ steps.app-cache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.app-cache.outputs.cache-matched-key == ''
        with:
          name: ios-app
          path: ios/build/Build/Products/

  ios-detox:
    name: Detox E2E for iOS (${{ matrix.shard }}/${{ strategy.job-total }})
    needs: [ios-build, ios-bundle]
    runs-on: macos-15
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ci/skip-detox') }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - run: sudo xcode-select -s /Applications/${{ env.xcode_version }}.app

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - # load the app before reinstalling detox, so that the package-lock cannot change
        name: Load the cached iOS app
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: app-cache
        with:
          fail-on-cache-miss: true
          path: ios/build/Build/Products/
          key: ${{ needs.ios-build.outputs.cache-key }}

      - # load the jsbundle before reinstalling detox, so that the package-lock cannot change
        name: Load the cached iOS jsbundle
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: jsbundle-cache
        with:
          fail-on-cache-miss: true
          path: |
            ios/AllAboutOlaf/main.jsbundle
            ios/AllAboutOlaf/main.jsbundle.map
            ios/assets/
          key: ${{ needs.ios-bundle.outputs.cache-key }}

      - name: Move cached jsbundle into place
        run: |
          mv ios/AllAboutOlaf/main.jsbundle ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/
          mv ios/AllAboutOlaf/main.jsbundle.map ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/
          rm -rf ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/assets || true
          mv ios/assets ios/build/Build/Products/Release-iphonesimulator/AllAboutOlaf.app/

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - run: npm ci

      - # We have to poke Detox because it installs things outside of node_modules/detox/…
        name: Re-install Detox
        run: npx detox clean-framework-cache && npx detox build-framework-cache

      - name: brew install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Discover the Detox device
        id: detox-device
        run: |
          set -o pipefail
          node -e 'let c = require("./detox.config.js"); console.log(JSON.stringify(c));' > detox-config.json
          jq -r '"type=\(.devices["ios.simulator"].device.type)"' < detox-config.json | tee -a "$GITHUB_OUTPUT"
          jq -r '"os=\(.devices["ios.simulator"].device.os | gsub("\\."; "-"))"' < detox-config.json | tee -a "$GITHUB_OUTPUT"

      - name: List available simulators (json)
        id: devices
        run: |
          set -o pipefail
          xcrun simctl list devices iOS -j \
            | jq '.devices | map_values([.[] | del(.dataPath, .dataPathSize, .logPath, .isAvailable)])' \
            | jq -r '"devices=\(.)"' \
            | tee "$GITHUB_OUTPUT"

      - name: List available simulators with "${{ steps.detox-device.outputs.os }}"
        id: devices-by-os
        env:
          DEVICES: '${{ steps.devices.outputs.devices }}'
          SIMULATOR_OS: '${{ steps.detox-device.outputs.os }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | to_entries[] | select(.key | endswith("iOS-\(env.SIMULATOR_OS)")) | .value | "devices=\(.)"' | tee "$GITHUB_OUTPUT"

      - name: List available ${{ steps.detox-device.outputs.os }} simulators for "${{ steps.detox-device.outputs.type }}"
        id: devices-by-os-and-type
        env:
          DEVICES: '${{ steps.devices-by-os.outputs.devices }}'
          SIMULATOR_TYPE: '${{ steps.detox-device.outputs.type }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | .[] | select(.name == env.SIMULATOR_TYPE) | "devices=\(.)"' | tee "$GITHUB_OUTPUT"

      - name: Resolve Detox device UDID
        id: udid
        env:
          DEVICES: '${{ steps.devices-by-os-and-type.outputs.devices }}'
        run: |
          set -o pipefail
          jq -rn --argjson devices "$DEVICES" '$devices | "udid=\(.udid)"' | tee "$GITHUB_OUTPUT"

      - name: Boot the simulator for Detox
        run: xcrun simctl boot "${{ steps.udid.outputs.udid }}"

      - name: Wait for the simulator to be ready
        run: xcrun simctl bootstatus "${{ steps.udid.outputs.udid }}" -b

      - name: Run the Detox tests
        timeout-minutes: 30
        env:
          DETOX_UDID: '${{ steps.udid.outputs.udid }}'
        run: |
          npx detox test \
            e2e/ \
            --configuration ios.sim.release \
            --record-logs all \
            --record-videos failing \
            --take-screenshots failing \
            -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Dump simulator system log on failure
        if: failure()
        run: |
          DEVICE_UDID=$(xcrun simctl list devices booted -j | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; print(next(d['udid'] for r in devs.values() for d in r if d['state']=='Booted'))" 2>/dev/null || echo "")
          if [ -n "$DEVICE_UDID" ]; then
            echo "=== Last 200 lines of simulator system log ==="
            xcrun simctl spawn "$DEVICE_UDID" log show --last 5m --predicate 'process == "AllAboutOlaf"' --style compact 2>/dev/null | tail -200 || echo "Could not retrieve simulator log"
          else
            echo "No booted simulator found"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: detox-ios-${{ matrix.shard }}
          path: artifacts/
